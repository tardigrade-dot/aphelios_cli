name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            features: "metal"
            arch: "arm64"
            suffix: "macos-arm64" # Apple Silicon
          - os: ubuntu-latest
            features: "cuda"
            suffix: "linux-x64"
          # - os: windows-latest
          #   features: "cuda"
          #   suffix: "windows-x64"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # 安装依赖 (针对 Linux/Windows 的 CUDA 构建可能需要额外的库)
      - name: Install Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwayland-dev libxkbcommon-dev # Slint 编译常用依赖

      - name: Install UPX (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install upx

      - name: Install UPX (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl

      - name: Install UPX (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install upx

      - name: Use UPX
        run: upx --version

      - name: Run Build Script
        # macOS/Linux 使用 sh, Windows 使用 bash (GitHub Actions 自带)
        run: bash ./build_release.sh "${{ matrix.features }}"

      - name: Package Assets (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # 打包 CLI 工具
          tar -czf aphelios-tool-${{ matrix.suffix }}.tar.gz -C release_bin aphelios_tool
          # 打包 .app bundle (压缩为 zip 以保持 .app 结构)
          cd release_bin && zip -rq ../aphelios-${{ matrix.suffix }}.zip Aphelios.app

      - name: Package Assets (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czf aphelios-tool-${{ matrix.suffix }}.tar.gz -C release_bin aphelios_tool

      - name: Package Assets (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path release_bin\aphelios_tool.exe -DestinationPath aphelios-tool-${{ matrix.suffix }}.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
